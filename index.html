<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Squad Member Profile</title>

    <link rel="shortcut icon" type="image/png" href="jasmine/jasmine-2.8.0/face.png">
    <link rel="stylesheet" href="jasmine/jasmine-2.8.0/jasmine.css" />
    <link rel="stylesheet" href="main.css" />
    <!-- include source files here... -->

    <script src="src/app.js"></script>
  </head>

  <body>
    <div class="profile-card">
      <!-- New avatar section -->
      <div class="member-avatar">
        <img 
          src="https://via.placeholder.com/100/FF0000/FFFFFF?text=AVATAR" 
          alt="Squad Member Avatar"
        >
      </div>

      <!-- Wrapped content -->
      <div class="profile-content">
        <div class="profile-header">
          <h2 class="member-name">John Doe</h2>
          <p class="member-role">Frontend Developer</p>
        </div>
        <div class="profile-body">
          <p class="member-bio">
            Passionate about building modern web applications and crafting intuitive user experiences.
          </p>
          <ul class="member-interests">
            <li>JavaScript</li>
            <li>React</li>
            <li>CSS</li>
            <li>UI/UX Design</li>
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
